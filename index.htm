<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshCart</title>
    <link rel="stylesheet" href="src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <header>
        <!-- Mobile Menu Start -->
        <div class="mobile-menu">
            <div class="container flex items-center justify-between gap-5 p-5 md:hidden xl:hidden">
                <a href="#">
                    <div id="logo">
                        <img src="https://themewagon.github.io/freshcart/assets/images/logo/freshcart-logo.svg"
                            alt="FreshCart Logo">
                    </div>
                </a>
                <div class="icon flex items-center gap-3 text-xl">
                    <i class="fa-regular fa-heart" style="color: rgb(79, 79, 78);"></i>
                    <i class="fa-regular fa-user" style="color: rgb(79, 79, 78);"></i>
                    <i class="fa-solid fa-cart-shopping" style="color: rgb(79, 79, 78);"></i>
                    <div class="menubar">
                        <i class="fa-solid fa-bars" style="color: rgb(79, 79, 78);"></i>
                    </div>
                </div>
            </div>
        </div>
        <!-- End -->

        <!-- Desktop Menu Start -->
        <div class="desktop-menu">
            <div
                class="container hidden md:flex xl:flex flex-row items-center justify-between gap-3 p-10 max-w-[1300px] mx-auto">
                <a href="#">
                    <div id="logo">
                        <img src="https://themewagon.github.io/freshcart/assets/images/logo/freshcart-logo.svg"
                            alt="FreshCart Logo">
                    </div>
                </a>
                <div class='flex gap-4 ml-auto'>
                    <div
                        class='flex max-w-xs w-full bg-gray-100 px-4 py-2.5 outline outline-transparent border border-gray-200 focus-within:border-slate-900 focus-within:bg-transparent transition-all'>
                        <input id="searchinput" type='text' placeholder='Search something...'
                            class='w-full text-sm bg-transparent outline-none pr-2' />
                        <div id="searchcardlist" class="searchcontainer flex gap-3 bg-gray-200 rounded-md absolute top-[80px] w-[350px] right-[10%]">
                            
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192.904 192.904" width="16px"
                            class="cursor-pointer fill-gray-400">
                            <path
                                d="m190.707 180.101-47.078-47.077c11.702-14.072 18.752-32.142 18.752-51.831C162.381 36.423 125.959 0 81.191 0 36.422 0 0 36.423 0 81.193c0 44.767 36.422 81.187 81.191 81.187 19.688 0 37.759-7.049 51.831-18.751l47.079 47.078a7.474 7.474 0 0 0 5.303 2.197 7.498 7.498 0 0 0 5.303-12.803zM15 81.193C15 44.694 44.693 15 81.191 15c36.497 0 66.189 29.694 66.189 66.193 0 36.496-29.692 66.187-66.189 66.187C44.693 147.38 15 117.689 15 81.193z">
                            </path>
                        </svg> 
                    </div>
                    <button id="toggleOpen" class='lg:hidden cursor-pointer'>
                        <svg class="w-7 h-7" fill="#000" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd"
                                d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"
                                clip-rule="evenodd"></path>
                        </svg>
                    </button>
                </div>
                <div class="icon text-xl flex items-center gap-3">
                    <i class="fa-regular fa-heart cursor-pointer" style="color: rgb(79, 79, 78);"></i>
                    <i class="fa-regular fa-user cursor-pointer" style="color: rgb(79, 79, 78);"></i>
                    <i class="fa-solid fa-cart-shopping cursor-pointer" style="color: rgb(79, 79, 78);"></i>
                </div>
            </div>
        </div>
        <!-- End -->
    </header>
    <main>
        <section class="filterproducts py-15">
            <div class="category flex flex-col justify-between gap-3 max-w-[1200px] mx-auto p-2">
                <div>
                    <h3 class="text-3xl font-semibold">Featured Categories</h3>
                </div> 
                <div id="productsfilter" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-4 p-3">

                </div>
            </div>
        </section>

        <section class="products">
            <div class="max-w-[1200px] mx-auto p-2">
                <div>
                    <h4 class="font-semibold text-3xl">Popular Products</h4>
                </div>
                <div id="productslist" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-5 py-3">
                    
                </div>
                <div id="msj" class="text-xl font-semibold"></div>
            </div>
        </section>
    </main>
    <footer></footer>

    <script src="js/app.js"></script>
    <script src="js/data.js"></script>
</body>

</html>
